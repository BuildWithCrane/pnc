<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>GERGOV.EU | INTEL</title>
    <style>
        :root[data-theme="light"] {
            --bg: #ffffff; --surface: #f8f9fa; --text: #1a1c1e; --border: #e2e4e7;
            --red-line: #d93025; --orange-line: #f29900; --accent: #000;
        }
        :root[data-theme="dark"] {
            --bg: #0f0f0f; --surface: #1a1a1a; --text: #e0e0e0; --border: #333;
            --red-line: #ff5252; --orange-line: #ffd740; --accent: #fff;
        }

        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        nav { width: 240px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 900; font-size: 18px; letter-spacing: -1px; margin-bottom: 40px; }
        
        /* Toggles */
        .toggle-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px; font-size: 10px; cursor: pointer; margin-bottom: 10px; font-weight: 800; }
        .toggle-btn:hover { background: var(--accent); color: var(--bg); }

        main { flex: 1; overflow-y: auto; padding: 40px; }
        .article-card { border-bottom: 1px solid var(--border); padding: 25px 0; cursor: pointer; }
        
        /* The Slate */
        #slate {
            position: fixed; top: 0; right: -110%; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: grid; grid-template-columns: 1fr 350px;
        }
        #slate.active { right: 0; }
        
        .slate-body { padding: 80px 10%; overflow-y: auto; border-right: 1px solid var(--border); }
        .slate-sidebar { background: var(--surface); padding: 80px 40px; }
        
        .close-slate { position: absolute; top: 30px; left: 30px; font-size: 11px; font-weight: 900; cursor: pointer; border: 1px solid var(--accent); padding: 6px 12px; z-index: 2100;}

        .dossier-title { font-size: 38px; font-weight: 900; line-height: 1.1; margin-bottom: 30px; }
        .dossier-content { font-size: 17px; line-height: 1.8; white-space: pre-wrap; }
        
        .mode-switch { margin-bottom: 20px; display: flex; gap: 10px; }
        .mode-switch span { font-size: 10px; font-weight: 900; opacity: 0.5; cursor: pointer; }
        .mode-switch span.active { opacity: 1; border-bottom: 2px solid var(--red-line); }

        .findings-box { margin-top: 40px; padding: 20px; border: 1px solid var(--border); border-left: 5px solid var(--red-line); background: var(--surface); }

        /* Highlights */
        .high-red { border-bottom: 2px solid var(--red-line); font-weight: 700; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GERGOV.EU</div>
        <button class="toggle-btn" onclick="toggleTheme()">TOGGLE DARK/LIGHT</button>
        <div class="nav-item">Collective Feed</div>
        <div style="margin-top: auto; font-size: 9px; opacity: 0.5;">ENCRYPTED_NODE_2026</div>
    </nav>

    <main>
        <div id="status" style="font-size: 10px; margin-bottom: 20px; font-weight: 800;">SYNCING...</div>
        <div id="feed-container"></div>
    </main>

    <div id="slate">
        <button class="close-slate" onclick="closeSlate()">← BACK TO FEED</button>
        <div class="slate-body">
            <div class="mode-switch">
                <span id="btn-std" class="active" onclick="setMode('standard')">STANDARD</span>
                <span id="btn-adv" onclick="setMode('advanced')">ADVANCED (3+ PARAGRAPHS)</span>
            </div>
            <h1 id="d-title" class="dossier-title"></h1>
            <div id="d-body" class="dossier-content"></div>
            <div id="d-findings" class="findings-box"></div>
        </div>
        <aside class="slate-sidebar">
            <h3 style="font-size: 11px; text-transform: uppercase;">Reference Library</h3>
            <div id="d-refs" style="font-size: 13px;"></div>
        </aside>
    </div>

    <script>
        let articles = [];
        let currentArticleId = null;
        let viewMode = 'standard';

        async function loadFeed() {
            try {
                const res = await fetch('https://gergov-brain.onrender.com/api/news');
                articles = await res.json();
                document.getElementById('status').innerText = "SYSTEMS ONLINE";
                document.getElementById('feed-container').innerHTML = articles.map(a => `
                    <div class="article-card" onclick="openSlate('${a.id}')">
                        <div style="font-size:10px; opacity:0.5; font-family:monospace;">${a.node}</div>
                        <div class="card-title">${a.title}</div>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('status').innerText = "OFFLINE"; }
        }

        function openSlate(id) {
            currentArticleId = id;
            const a = articles.find(x => x.id === id);
            document.getElementById('d-title').innerText = a.title;
            updateContent();
            
            document.getElementById('d-findings').innerHTML = a.findings.length ? `<h4>MISMATCH DETECTED</h4><ul>${a.findings.map(f => `<li>${f}</li>`).join('')}</ul>` : "<h4>NO DISCREPANCIES FOUND</h4>";
            document.getElementById('slate').classList.add('active');
        }

        function updateContent() {
            const a = articles.find(x => x.id === currentArticleId);
            document.getElementById('d-body').innerHTML = viewMode === 'standard' ? a.standard : a.advanced;
        }

        function setMode(m) {
            viewMode = m;
            document.getElementById('btn-std').classList.toggle('active', m === 'standard');
            document.getElementById('btn-adv').classList.toggle('active', m === 'advanced');
            updateContent();
        }

        function closeSlate() { 
            document.getElementById('slate').classList.remove('active'); 
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }

        loadFeed();
    </script>
</body>
</html>
