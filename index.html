<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERGOV.EU | INTEL TERMINAL</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8f9fa;
            --border: #e2e4e7;
            --text-main: #1a1c1e;
            --text-dim: #5f6368;
            --accent: #000000;
            --warning: #fbc02d;
            --red-line: #d93025;
            --orange-line: #f29900;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: "Inter", -apple-system, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Navigation */
        nav { 
            width: 240px; border-right: 1px solid var(--border); 
            padding: 20px; display: flex; flex-direction: column;
        }
        .logo { font-weight: 900; font-size: 18px; letter-spacing: -1px; margin-bottom: 40px; }
        .nav-item { 
            padding: 10px 0; font-size: 11px; font-weight: 700; color: var(--text-dim); 
            text-transform: uppercase; cursor: pointer;
        }

        /* Feed */
        main { flex: 1; overflow-y: auto; padding: 40px; }
        .grid-header { 
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 30px;
        }
        .grid-header h2 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .article-card { 
            border-bottom: 1px solid var(--border); padding: 25px 0; cursor: pointer;
        }
        .article-card:hover { background: var(--surface); }
        .meta-line { font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; font-family: monospace; }
        .card-title { font-size: 22px; font-weight: 800; margin: 0 0 10px 0; color: var(--accent); line-height: 1.1; }
        .card-preview { font-size: 14px; color: var(--text-dim); max-width: 800px; }

        /* Underline Logic from Sketch */
        .high-red { border-bottom: 2px solid var(--red-line); font-weight: 700; color: var(--red-line); }
        .high-orange { border-bottom: 2px solid var(--orange-line); font-weight: 700; }

        /* THE SLATE (Full Screen Dossier) */
        #slate {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: #fff; z-index: 1000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: grid; grid-template-columns: 1fr 350px;
        }
        #slate.active { right: 0; }
        
        .slate-body { padding: 80px 10%; overflow-y: auto; border-right: 1px solid var(--border); position: relative; }
        .slate-sidebar { background: var(--surface); padding: 80px 40px; }
        
        .close-slate { 
            position: absolute; top: 30px; left: 30px; font-size: 11px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; border: 1px solid #000; padding: 6px 12px;
        }

        .dossier-id { font-family: monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 20px; }
        .dossier-title { font-size: 42px; font-weight: 900; line-height: 1; margin: 0 0 40px 0; }
        .dossier-content { font-size: 18px; line-height: 1.7; color: #1a1a1a; }

        /* The Findings/Discrepancy Box */
        .findings-box {
            margin-top: 60px; padding: 25px; border: 1px solid var(--border);
            border-left: 5px solid var(--red-line); background: #fffcfc;
        }
        .findings-box h4 { margin: 0 0 10px 0; font-size: 11px; text-transform: uppercase; color: var(--red-line); }
        .findings-box ul { margin: 0; padding-left: 18px; font-size: 14px; line-height: 1.6; }

        .ref-row { margin-bottom: 25px; }
        .ref-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        .ref-val { font-size: 14px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GERGOV.EU</div>
        <div class="nav-item">Collective Feed</div>
        <div class="nav-item">Archive</div>
        <div class="nav-item">System Logic</div>
        <div style="margin-top: auto; font-size: 9px; font-weight: 800; color: var(--text-dim);">
            NODE_STATUS: SECURE // 2026
        </div>
    </nav>

    <main>
        <div class="grid-header">
            <h2>Live Intelligence Stream</h2>
            <div id="status" style="font-size: 10px; font-weight: 800;">SYNCING...</div>
        </div>
        <div id="feed-container"></div>
    </main>

    <div id="slate">
        <div class="close-slate" onclick="closeSlate()">← Return to Feed</div>
        <div class="slate-body">
            <div id="d-id" class="dossier-id"></div>
            <h1 id="d-title" class="dossier-title"></h1>
            <div id="d-body" class="dossier-content"></div>
            
            <div id="d-findings" class="findings-box" style="display:none;">
                <h4>Discrepancy Analysis</h4>
                <ul id="findings-list"></ul>
            </div>
        </div>
        <aside class="slate-sidebar">
            <h3 style="font-size: 11px; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1px;">Reference Library</h3>
            <div id="d-refs"></div>
        </aside>
    </div>

    <script>
        let articles = [];

        async function loadFeed() {
            try {
                // REPLACE WITH YOUR LIVE RENDER URL
                const response = await fetch('https://your-backend.onrender.com/api/news');
                articles = await response.json();
                
                document.getElementById('status').innerText = `NODE ONLINE // ${articles.length} SOURCES`;
                const container = document.getElementById('feed-container');
                container.innerHTML = articles.map(a => `
                    <div class="article-card" onclick="openSlate('${a.id}')">
                        <div class="meta-line">${a.source} // ${a.timestamp}</div>
                        <h3 class="card-title">${a.title}</h3>
                        <div class="card-preview">${a.summary}</div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('status').innerText = "CONNECTION_FAIL";
            }
        }

        function openSlate(id) {
            const a = articles.find(x => x.id === id);
            if (!a) return;

            document.getElementById('d-id').innerText = `GERGOV_DOSSIER: ${a.node} // ${a.timestamp}`;
            document.getElementById('d-title').innerText = a.title;
            document.getElementById('d-body').innerHTML = a.body; // Use innerHTML for highlights
            
            // Populate Analysis Findings
            const findingsDiv = document.getElementById('d-findings');
            const list = document.getElementById('findings-list');
            if (a.findings && a.findings.length > 0) {
                findingsDiv.style.display = 'block';
                list.innerHTML = a.findings.map(f => `<li>${f}</li>`).join('');
            } else {
                findingsDiv.style.display = 'none';
            }

            // Reference Library
            document.getElementById('d-refs').innerHTML = a.refs.map(r => `
                <div class="ref-row">
                    <div class="ref-label">${r.label}</div>
                    <div class="ref-val">${r.val}</div>
                </div>
            `).join('');

            document.getElementById('slate').classList.add('active');
        }

        function closeSlate() {
            document.getElementById('slate').classList.remove('active');
        }

        loadFeed();
    </script>
</body>
</html>
