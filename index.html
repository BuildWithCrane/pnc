<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERGOV | INTEL TERMINAL</title>
    <style>
        :root {
            --bg: #f5f5f3; 
            --sidebar-bg: #ecece9;
            --text: #1a1a1a;
            --border: #bcbcbc;
            --red: #c62828;
            --orange: #ef6c00;
        }

        * { box-sizing: border-box; }
        body { font-family: "Times New Roman", Times, serif; background: var(--bg); color: var(--text); margin: 0; }

        /* Navigation */
        header { 
            padding: 15px 40px; border-bottom: 2px solid #000; 
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; position: sticky; top: 0; z-index: 100;
        }

        /* Feed */
        main { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card { 
            background: #fff; border: 1px solid var(--border); padding: 30px; 
            margin-bottom: 25px; cursor: pointer; transition: transform 0.1s;
        }
        .card:hover { border-color: #000; transform: translateY(-2px); }
        .card-meta { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; color: #777; margin-bottom: 10px; }
        .card-title { font-size: 24px; font-weight: bold; margin: 0; line-height: 1.1; }

        /* THE SLATE (Full Screen Dossier) */
        #slate {
            position: fixed; top: 0; left: 100%; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000; transition: left 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
        }
        #slate.active { left: 0; }

        .dossier-main { 
            flex: 1; padding: 80px 10%; overflow-y: auto; 
            border-right: 2px solid #000; position: relative;
        }
        .dossier-sidebar { width: 350px; background: var(--sidebar-bg); padding: 80px 40px; }

        .close-btn { 
            position: absolute; top: 30px; left: 40px; cursor: pointer; 
            font-family: Arial, sans-serif; font-size: 12px; font-weight: 900; 
            border: 1px solid #000; padding: 5px 15px; background: #fff;
        }

        /* Dynamic Highlighting from your sketch */
        .high-red { border-bottom: 2px solid var(--red); color: var(--red); font-weight: bold; }
        .high-orange { border-bottom: 2px solid var(--orange); background: rgba(239, 108, 0, 0.1); }

        .doc-header { font-family: monospace; font-size: 12px; margin-bottom: 30px; border-bottom: 1px solid #aaa; padding-bottom: 10px; }
        .doc-title { font-size: 48px; font-weight: bold; margin-bottom: 40px; line-height: 1; }
        .doc-body { font-size: 20px; line-height: 1.7; }

        .ref-section { margin-bottom: 40px; }
        .ref-label { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        .ref-value { font-size: 16px; font-weight: bold; margin-top: 5px; }

        .discrepancy-footer { 
            margin-top: 60px; padding: 25px; border: 1px dashed var(--red); 
            background: rgba(198, 40, 40, 0.05); font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 20px; letter-spacing: -1px;">GERGOV // INTEL</div>
    <div id="status" style="font-family: monospace; font-size: 11px;">SYNCING_NODES...</div>
</header>

<main id="feed-root"></main>

<div id="slate">
    <div class="dossier-main">
        <div class="close-btn" onclick="closeSlate()">← BACK TO FEED</div>
        <div id="d-header" class="doc-header"></div>
        <h1 id="d-title" class="doc-title"></h1>
        <div id="d-body" class="doc-body"></div>
        <div id="d-footer"></div>
    </div>
    <aside class="dossier-sidebar">
        <div style="font-family: Arial; font-weight: 900; font-size: 12px; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 30px;">REFERENCE LIBRARY</div>
        <div id="d-refs"></div>
    </aside>
</div>

<script>
    let currentData = [];

    async function updateIntel() {
        try {
            const res = await fetch('https://gergov-brain.onrender.com/api/news');
            currentData = await res.json();
            document.getElementById('status').innerText = `SYNC_COMPLETE // NODES: ${currentData.length}`;
            renderCards();
        } catch (e) {
            document.getElementById('status').innerText = "SYNC_FAILED";
        }
    }

    function renderCards() {
        const root = document.getElementById('feed-root');
        root.innerHTML = currentData.map(item => `
            <div class="card" onclick="openSlate('${item.id}')">
                <div class="card-meta">${item.source} // ${item.timestamp}</div>
                <h3 class="card-title">${item.title}</h3>
            </div>
        `).join('');
    }

    function openSlate(id) {
        const item = currentData.find(x => x.id === id);
        document.getElementById('d-header').innerText = `ID: ${item.node} // CLASSIFICATION: RESTRICTED`;
        document.getElementById('d-title').innerText = item.title;
        document.getElementById('d-body').innerHTML = item.body;
        
        document.getElementById('d-refs').innerHTML = item.refs.map(r => `
            <div class="ref-section">
                <div class="ref-label">${r.label}</div>
                <div class="ref-value">${r.val}</div>
            </div>
        `).join('');

        const foot = document.getElementById('d-footer');
        foot.innerHTML = item.discrepancy ? `
            <div class="discrepancy-footer">
                <span style="color:var(--red); font-weight:bold;">● ALERT: DISCREPANCY FOUND</span><br><br>
                ${item.discrepancy}
            </div>` : '';

        document.getElementById('slate').classList.add('active');
        window.scrollTo(0, 0);
    }

    function closeSlate() {
        document.getElementById('slate').classList.remove('active');
    }

    updateIntel();
</script>

</body>
</html>
